<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const root = ReactDOM.createRoot(document.getElementById('root'));

        // 연습1) 아래 변수에 저장된 값을 <div> 태그로 화면에 표시하세요.
        const name = 'Tom'

        const nameElement = <div>{name}</div>

        // 연습2) 아래 객체에 저장된 값 중 model 속성만 <div> 태그로 화면에 표시하세요.

        const car = {
            model: 'sorento',
            price: 4000,
        };

        const carElement = <div>{car.model}</div>

        // 연습3) 아래 score 값이 60 이상이면 "합격", 아니면 "불합격"을 <div> 태그로 화면에 표시하세요.
        const score = 80;

        const scoreElement = score >= 60
            ? <div>합격</div>
            : <div>불합격</div>;

        // 연습4) 아래 변수에 저장된 값이 없으면 "값없음", 값이 있으면 저장된 값을 <div> 태그로 화면에 표시하세요.

        let value = 2;
        const valueElement = value
            ? <div>{value}</div>
            : <div>값없음</div>;

        // 연습5) 아래 color 값이 "r"이면 "red", "g"이면 "green", "b"이면 "blue" 배경색을 <div> 태그에 적용해 화면에 표시하세요.(100 x 100 크기)
        const color = 'g';

        const rgb = {
            'r': 'red',
            'g': 'green',
            'b': 'blut',
        };

        const style = {
            width: 100,
            height: 100,
            backgroundColor: rgb[color]
        };

        const colorElement = <div style={style}></div>


        root.render([
            nameElement,
            carElement,
            scoreElement,
            valueElement,
            colorElement
        ]);
    </script>
</body>

</html>
